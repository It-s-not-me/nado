{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>{{ document.title }}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="detail-card">
            <a href="{% url 'document_list' %}" class="back-link">← Назад к списку</a>

            <h1 class="detail-title">{{ document.title }}</h1>

            <div class="detail-row">
                <span class="detail-label">Описание:</span>
                <p class="detail-text">{{ document.description|default:"Описание отсутствует" }}</p>
            </div>

            <div class="detail-row">
                <span class="detail-label">Статус:</span>
                <span class="status">Статус: {{ document.get_status_display }}</span>
            </div>

            <div class="detail-row">
                <span class="detail-label">Дата создания:</span>
                <p class="detail-text">{{ document.created_at|date:"d.m.Y H:i" }}</p>
            </div>

            <div class="detail-row">
                <span class="detail-label">Файл:</span>
                <a href="{{ document.file.url }}" target="_blank" class="file-link">Открыть файл</a>
            </div>
        </div>
    </div>
</body>
</html>
