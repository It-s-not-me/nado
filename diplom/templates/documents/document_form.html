{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Добавить документ</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
    <div class="container">
        <div class="detail-card">
            <a href="{% url 'document_list' %}" class="back-link">← Назад к списку</a>

            <h1 class="detail-title">Добавить документ</h1>

            <form method="post" enctype="multipart/form-data" class="document-form">
                {% csrf_token %}

                <div class="form-group">
                    {{ form.title.label_tag }}
                    {{ form.title }}
                </div>

                <div class="form-group">
                    {{ form.description.label_tag }}
                    {{ form.description }}
                </div>

                <div class="form-group">
                    {{ form.file.label_tag }}
                    {{ form.file }}
                </div>

                <div class="form-group">
                    {{ form.status.label_tag }}
                    {{ form.status }}
                </div>

                <button type="submit" class="save-button">Сохранить документ</button>
            </form>
        </div>
    </div>
</body>
</html>
