services:
  db:
    image: postgres:16
    container_name: diplom_postgres
    restart: always
    environment:
      POSTGRES_DB: diplom_db
      POSTGRES_USER: diplom_user
      POSTGRES_PASSWORD: diplom_password
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: diplom_web
    restart: always
    working_dir: /app
    command: python manage.py runserver 0.0.0.0:8000
    environment:
      POSTGRES_DB: diplom_db
      POSTGRES_USER: diplom_user
      POSTGRES_PASSWORD: diplom_password
      POSTGRES_HOST: db
      POSTGRES_PORT: 5432
    ports:
      - "8000:8000"
    volumes:
      - media_data:/app/media
    depends_on:
      - db

volumes:
  postgres_data:
  media_data: